openapi: 3.1.0
info:
  title: Spotter AI ELD & Route Planner API
  description: |
    Production REST API for trip planning with FMCSA HOS compliance.

    ## Overview
    This API calculates optimal trucking routes while enforcing all FMCSA Hours of Service rules.

    ## Features
    - Route calculation (Nominatim geocoding + OSRM routing)
    - FMCSA HOS compliance enforcement (5 rules)
    - Multi-day logbook generation
    - Fuel stop and rest break scheduling
    - 70-hour / 8-day cycle tracking

    ## Authentication
    Currently no authentication required (development mode).
    Production: JWT authentication (planned).

    ## Rate Limiting
    Not currently enforced. Production: 60 requests/minute per IP.

    ## CORS
    - Development: All origins allowed
    - Production: Specific frontend domains only

  version: "1.0.0"
  contact:
    name: Spotter Support
    email: support@spotter-eld.app
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.spotter-eld.app
    description: Production API
  - url: https://staging-api.railway.app
    description: Staging API

paths:
  /api/plan-route/:
    post:
      tags:
        - Route Planning
      summary: Plan a complete trip with HOS compliance
      description: |
        Calculate optimal route from current location through pickup and dropoff,
        enforcing all FMCSA Hours of Service rules.

        ## Process
        1. Geocode all three locations (Nominatim)
        2. Calculate route distances/times (OSRM)
        3. Simulate trip with HOS rules (custom engine)
        4. Generate multi-day logbook
        5. Return route, markers, and logbook

        ## Performance
        - Typical response time: 2-5 seconds
        - Timeout: 30 seconds

        ## Error Handling
        Returns 400 for validation errors, 500 for server errors.

      operationId: planRoute

      requestBody:
        required: true
        description: Trip planning parameters
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripRequest"
            examples:
              chicago_to_dallas:
                summary: Chicago to Dallas trip
                value:
                  current_location: "Chicago, IL"
                  pickup_location: "Indianapolis, IN"
                  dropoff_location: "Dallas, TX"
                  cycle_hours_used: 30
              la_to_denver:
                summary: LA to Denver trip (high mileage)
                value:
                  current_location: "Los Angeles, CA"
                  pickup_location: "Las Vegas, NV"
                  dropoff_location: "Denver, CO"
                  cycle_hours_used: 0
              ny_to_miami:
                summary: NY to Miami trip (maximum mileage)
                value:
                  current_location: "New York, NY"
                  pickup_location: "Charlotte, NC"
                  dropoff_location: "Miami, FL"
                  cycle_hours_used: 50

      responses:
        "200":
          description: Successful route planning
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRouteResponse"
              examples:
                success:
                  summary: Successful response
                  value:
                    route_coordinates:
                      - [41.8781, -87.6298]
                      - [41.0, -87.0]
                      - [39.7684, -86.1581]
                      - [32.7767, -96.797]
                    markers:
                      - type: start
                        lat: 41.8781
                        lon: -87.6298
                        label: "Start: Chicago, IL"
                      - type: pickup
                        lat: 39.7684
                        lon: -86.1581
                        label: "Pickup: Indianapolis, IN"
                      - type: dropoff
                        lat: 32.7767
                        lon: -96.797
                        label: "Dropoff: Dallas, TX"
                      - type: fuel
                        lat: 35.5
                        lon: -90.0
                        label: "Fuel Stop"
                      - type: rest
                        lat: 33.0
                        lon: -93.5
                        label: "Rest Break (10-hr)"
                    logbook_days:
                      - day: 1
                        events:
                          - status: DRIVING
                            start_minute: 0
                            duration_minutes: 660
                            label: "Driving"
                          - status: ON_DUTY_ND
                            start_minute: 660
                            duration_minutes: 60
                            label: "On-duty (Pickup)"
                          - status: DRIVING
                            start_minute: 720
                            duration_minutes: 300
                            label: "Driving"
                          - status: OFF_DUTY
                            start_minute: 1020
                            duration_minutes: 420
                            label: "Off-duty (Rest)"
                      - day: 2
                        events:
                          - status: OFF_DUTY
                            start_minute: 0
                            duration_minutes: 600
                            label: "Off-duty (Rest)"
                          - status: ON_DUTY_ND
                            start_minute: 600
                            duration_minutes: 60
                            label: "On-duty (Dropoff)"
                          - status: OFF_DUTY
                            start_minute: 660
                            duration_minutes: 780
                            label: "Off-duty (Remaining)"
                    trip_summary:
                      total_distance_miles: 850.5
                      total_trip_hours: 13.5
                      total_drive_hours: 11.0
                      fuel_stops: 1
                      rest_stops: 1
                      legs: 3

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_location:
                  summary: Invalid location
                  value:
                    error: "validation_error"
                    detail: "current_location: Address not found (Chicago, XYZ)"
                    status_code: 400
                invalid_hours:
                  summary: Cycle hours out of range
                  value:
                    error: "validation_error"
                    detail: "cycle_hours_used: Ensure this value is less than or equal to 70."
                    status_code: 400
                missing_field:
                  summary: Missing required field
                  value:
                    error: "validation_error"
                    detail: "dropoff_location: This field is required."
                    status_code: 400

        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "server_error"
                detail: "An unexpected error occurred. Please try again."
                status_code: 500

components:
  schemas:
    TripRequest:
      type: object
      required:
        - current_location
        - pickup_location
        - dropoff_location
        - cycle_hours_used
      properties:
        current_location:
          type: string
          minLength: 2
          maxLength: 255
          description: Current driver location (city, state or full address)
          examples:
            - "Chicago, IL"
            - "New York, New York"
            - "123 Main St, Dallas, TX"
        pickup_location:
          type: string
          minLength: 2
          maxLength: 255
          description: Pickup location (city, state or full address)
          examples:
            - "Indianapolis, IN"
            - "Los Angeles, CA"
        dropoff_location:
          type: string
          minLength: 2
          maxLength: 255
          description: Final destination/dropoff location
          examples:
            - "Dallas, TX"
            - "Denver, Colorado"
        cycle_hours_used:
          type: integer
          minimum: 0
          maximum: 70
          description: |
            Hours already used in the current 8-day rolling cycle (0-70).
            Used to enforce 70-hour / 8-day FMCSA rule.
          examples:
            - 0
            - 30
            - 65

    PlanRouteResponse:
      type: object
      required:
        - route_coordinates
        - markers
        - logbook_days
        - trip_summary
      properties:
        route_coordinates:
          type: array
          items:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
            description: "[latitude, longitude]"
          description: |
            Route polyline as array of [lat, lon] coordinate pairs.
            Includes: start → pickup → waypoints → dropoff

        markers:
          type: array
          items:
            $ref: "#/components/schemas/Marker"
          description: |
            Route points of interest (start, pickup, dropoff, fuel stops, rest breaks).
            Min 3 (start, pickup, dropoff), max N+2 with fuel/rest stops.

        logbook_days:
          type: array
          items:
            $ref: "#/components/schemas/LogbookDay"
          description: |
            Multi-day logbook breakdown. Each day covers 24-hour period.
            Minimum 1 day, typically 1-3 days for long haul trips.

        trip_summary:
          $ref: "#/components/schemas/TripSummary"

    Marker:
      type: object
      required:
        - type
        - lat
        - lon
        - label
      properties:
        type:
          type: string
          enum:
            - start
            - pickup
            - dropoff
            - fuel
            - rest
          description: Marker type indicates location purpose
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: Latitude coordinate (-90 to 90)
        lon:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: Longitude coordinate (-180 to 180)
        label:
          type: string
          description: Human-readable label (e.g., "Chicago, IL" or "Fuel Stop #1")

    LogbookDay:
      type: object
      required:
        - day
        - events
      properties:
        day:
          type: integer
          minimum: 1
          description: Day number (1-indexed)
        events:
          type: array
          items:
            $ref: "#/components/schemas/LogbookEvent"
          description: Chronological list of events for this day (covers 24 hours)

    LogbookEvent:
      type: object
      required:
        - status
        - start_minute
        - duration_minutes
      properties:
        status:
          type: string
          enum:
            - OFF_DUTY
            - SLEEPER
            - DRIVING
            - ON_DUTY_ND
          description: |
            FMCSA duty status:
            - OFF_DUTY: Not working (sleep, meals, personal time)
            - SLEEPER: In sleeper berth
            - DRIVING: Actively driving vehicle
            - ON_DUTY_ND: On-duty but not driving (pickup, fuel, rest breaks)
        start_minute:
          type: integer
          minimum: 0
          maximum: 1440
          description: Start time in minutes since midnight (0-1440)
        duration_minutes:
          type: integer
          minimum: 1
          description: Duration in minutes
        label:
          type: string
          description: Human-readable label (e.g., "Driving to Pickup" or "30-min Break")

    TripSummary:
      type: object
      required:
        - total_distance_miles
        - total_trip_hours
        - total_drive_hours
        - fuel_stops
        - rest_stops
        - legs
      properties:
        total_distance_miles:
          type: number
          format: float
          minimum: 0
          description: Total trip distance in miles
        total_trip_hours:
          type: number
          format: float
          minimum: 0
          description: Total elapsed time from start to finish (includes rest)
        total_drive_hours:
          type: number
          format: float
          minimum: 0
          maximum: 11
          description: Total actual driving hours (enforced 11-hour limit per shift)
        fuel_stops:
          type: integer
          minimum: 0
          description: Number of mandatory fuel stops (every 1,000 miles)
        rest_stops:
          type: integer
          minimum: 0
          description: Number of mandatory rest breaks
        legs:
          type: integer
          minimum: 1
          description: Number of driving legs in trip

    ErrorResponse:
      type: object
      required:
        - error
        - detail
        - status_code
      properties:
        error:
          type: string
          enum:
            - validation_error
            - not_found
            - server_error
            - timeout_error
          description: Error category
        detail:
          type: string
          description: Human-readable error message
        status_code:
          type: integer
          enum:
            - 400
            - 404
            - 500
          description: HTTP status code

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication (future)

tags:
  - name: Route Planning
    description: Trip planning and HOS compliance calculation
  - name: Health
    description: API health checks (future)

externalDocs:
  description: API Implementation Guide
  url: https://github.com/fworks-tech/spotter-eld-logging-api

x-fmcsa-rules:
  rule-1: 1-hour on-duty at pickup and dropoff
  rule-2: Fuel stop every 1,000 miles
  rule-3: 11-hour driving limit per shift
  rule-4: 14-hour on-duty window
  rule-5: 30-minute break after 8 hours driving
  cycle: 70-hour / 8-day rolling cycle enforcement

x-implementation:
  geocoding: Nominatim (OpenStreetMap)
  routing: OSRM (Open Source Routing Machine)
  hos-engine: Custom Python simulation
  database: PostgreSQL (production)
  deployment: Railway
