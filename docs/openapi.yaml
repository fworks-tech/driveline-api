openapi: 3.0.3
info:
  title: Spotter AI ELD & Route Planner API
  version: 1.0.0
  description: Production REST API for trip planning with FMCSA HOS compliance.
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: Register a new user account
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
              - username
              - email
              - password
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
          description: ''
  /api/auth/token/:
    post:
      operationId: v1_auth_token_create
      description: Obtain JWT access and refresh tokens
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
              - username
              - password
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: JWT access token
                  refresh:
                    type: string
                    description: JWT refresh token
          description: ''
  /api/health/:
    get:
      operationId: v1_health_retrieve
      description: Simple liveness endpoint for container and deployment health checks.
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/plan-route/:
    post:
      operationId: v1_plan_route_create
      description: |-
        POST /api/plan-route/

        Accepts trip details, geocodes locations, fetches route from OSRM,
        runs HOS simulation, and returns full trip data.

        Authentication is optional - allows both authenticated and public requests.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripOutput'
          description: ''
  /health/:
    get:
      operationId: health_retrieve
      description: Simple liveness endpoint for container and deployment health checks.
      tags:
      - health
      responses:
        '200':
          description: No response body
components:
  schemas:
    LogbookDay:
      type: object
      properties:
        day:
          type: integer
        date_offset:
          type: integer
        total_driving_hours:
          type: number
          format: double
        total_on_duty_hours:
          type: number
          format: double
        events:
          type: array
          items:
            $ref: '#/components/schemas/LogbookEvent'
      required:
      - date_offset
      - day
      - events
      - total_driving_hours
      - total_on_duty_hours
    LogbookEvent:
      type: object
      properties:
        status:
          type: string
          maxLength: 50
        start_time:
          type: string
          maxLength: 5
        end_time:
          type: string
          maxLength: 5
        duration_hours:
          type: number
          format: double
        label:
          type: string
          maxLength: 255
        location:
          type: string
          maxLength: 255
      required:
      - duration_hours
      - end_time
      - label
      - start_time
      - status
    Marker:
      type: object
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        type:
          type: string
          maxLength: 50
        label:
          type: string
          maxLength: 255
      required:
      - label
      - lat
      - lon
      - type
    TripInput:
      type: object
      properties:
        current_location:
          type: string
          maxLength: 500
          minLength: 2
        pickup_location:
          type: string
          maxLength: 500
          minLength: 2
        dropoff_location:
          type: string
          maxLength: 500
          minLength: 2
        cycle_hours_used:
          type: number
          format: double
          maximum: 70
          minimum: 0
      required:
      - current_location
      - cycle_hours_used
      - dropoff_location
      - pickup_location
    TripOutput:
      type: object
      properties:
        route_coordinates:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
        markers:
          type: array
          items:
            $ref: '#/components/schemas/Marker'
        logbook_days:
          type: array
          items:
            $ref: '#/components/schemas/LogbookDay'
        trip_summary:
          $ref: '#/components/schemas/TripSummary'
      required:
      - logbook_days
      - markers
      - route_coordinates
      - trip_summary
    TripSummary:
      type: object
      properties:
        total_distance_miles:
          type: number
          format: double
        total_trip_hours:
          type: number
          format: double
        total_drive_hours:
          type: number
          format: double
        legs:
          type: integer
        rest_stops:
          type: integer
        fuel_stops:
          type: integer
      required:
      - fuel_stops
      - legs
      - rest_stops
      - total_distance_miles
      - total_drive_hours
      - total_trip_hours
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
