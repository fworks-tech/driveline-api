openapi: 3.0.3
info:
  title: Spotter AI ELD & Route Planner API
  version: 1.0.0
  description: Production REST API for trip planning with FMCSA HOS compliance.
paths:
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Register a new user account
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
              - username
              - email
              - password
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  email:
                    type: string
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: Obtain JWT access and refresh tokens
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
              - username
              - password
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: JWT access token
                  refresh:
                    type: string
                    description: JWT refresh token
          description: ''
  /api/health/:
    get:
      operationId: health_retrieve
      description: Simple liveness endpoint for container and deployment health checks.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
          description: ''
  /api/plan-route/:
    post:
      operationId: plan_route_create
      description: |-
        POST /api/plan-route/

        Accepts trip details, geocodes locations, fetches route from OSRM,
        runs HOS simulation, and returns full trip data.

        Authentication is optional - allows both authenticated and public requests.
      tags:
      - plan-route
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripInput'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripOutput'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/trips/:
    get:
      operationId: trips_list
      description: |-
        ViewSet for CRUD operations on user trips.

        Endpoints:
        - GET /api/trips/ - List user's trips (paginated)
        - POST /api/trips/ - Create new trip
        - GET /api/trips/{id}/ - Retrieve trip
        - PUT /api/trips/{id}/ - Update trip
        - DELETE /api/trips/{id}/ - Delete trip
      tags:
      - trips
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TripList'
          description: ''
    post:
      operationId: trips_create
      description: Create a new trip from form input and return full trip data.
      tags:
      - trips
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripCreate'
          description: ''
  /api/trips/{id}/:
    get:
      operationId: trips_retrieve
      description: |-
        ViewSet for CRUD operations on user trips.

        Endpoints:
        - GET /api/trips/ - List user's trips (paginated)
        - POST /api/trips/ - Create new trip
        - GET /api/trips/{id}/ - Retrieve trip
        - PUT /api/trips/{id}/ - Update trip
        - DELETE /api/trips/{id}/ - Delete trip
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this trip.
        required: true
      tags:
      - trips
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
          description: ''
    put:
      operationId: trips_update
      description: |-
        ViewSet for CRUD operations on user trips.

        Endpoints:
        - GET /api/trips/ - List user's trips (paginated)
        - POST /api/trips/ - Create new trip
        - GET /api/trips/{id}/ - Retrieve trip
        - PUT /api/trips/{id}/ - Update trip
        - DELETE /api/trips/{id}/ - Delete trip
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this trip.
        required: true
      tags:
      - trips
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Trip'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
          description: ''
    patch:
      operationId: trips_partial_update
      description: |-
        ViewSet for CRUD operations on user trips.

        Endpoints:
        - GET /api/trips/ - List user's trips (paginated)
        - POST /api/trips/ - Create new trip
        - GET /api/trips/{id}/ - Retrieve trip
        - PUT /api/trips/{id}/ - Update trip
        - DELETE /api/trips/{id}/ - Delete trip
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this trip.
        required: true
      tags:
      - trips
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTrip'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
          description: ''
    delete:
      operationId: trips_destroy
      description: |-
        ViewSet for CRUD operations on user trips.

        Endpoints:
        - GET /api/trips/ - List user's trips (paginated)
        - POST /api/trips/ - Create new trip
        - GET /api/trips/{id}/ - Retrieve trip
        - PUT /api/trips/{id}/ - Update trip
        - DELETE /api/trips/{id}/ - Delete trip
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this trip.
        required: true
      tags:
      - trips
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /health/:
    get:
      operationId: health_retrieve_2
      description: Simple liveness endpoint for container and deployment health checks.
      tags:
      - health
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
          description: ''
components:
  schemas:
    HealthCheck:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    LogbookDay:
      type: object
      properties:
        day:
          type: integer
        date_offset:
          type: integer
        date:
          type: string
          maxLength: 10
        from_location:
          type: string
          maxLength: 255
        to_location:
          type: string
          maxLength: 255
        daily_miles:
          type: number
          format: double
        cumulative_miles:
          type: number
          format: double
        total_driving_hours:
          type: number
          format: double
        total_on_duty_hours:
          type: number
          format: double
        row_totals:
          type: object
          additionalProperties: {}
        events:
          type: array
          items:
            $ref: '#/components/schemas/LogbookEvent'
      required:
      - cumulative_miles
      - daily_miles
      - date
      - date_offset
      - day
      - events
      - from_location
      - row_totals
      - to_location
      - total_driving_hours
      - total_on_duty_hours
    LogbookEvent:
      type: object
      properties:
        status:
          type: string
          maxLength: 50
        start_time:
          type: string
          maxLength: 5
        end_time:
          type: string
          maxLength: 5
        duration_hours:
          type: number
          format: double
        label:
          type: string
          maxLength: 255
        location:
          type: string
          maxLength: 255
      required:
      - duration_hours
      - end_time
      - label
      - start_time
      - status
    Marker:
      type: object
      properties:
        lat:
          type: number
          format: double
        lon:
          type: number
          format: double
        type:
          type: string
          maxLength: 50
        label:
          type: string
          maxLength: 255
      required:
      - label
      - lat
      - lon
      - type
    PatchedTrip:
      type: object
      description: Serializer for Trip model with full trip data.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        current_location:
          type: string
          maxLength: 255
        pickup_location:
          type: string
          maxLength: 255
        dropoff_location:
          type: string
          maxLength: 255
        cycle_hours_used:
          type: number
          format: double
          description: Hours already used in current 70-hour cycle
        trip_date:
          type: string
          format: date
          nullable: true
        tractor_number:
          type: string
          maxLength: 50
        trailer_number:
          type: string
          maxLength: 50
        shipper_name:
          type: string
          maxLength: 255
        route_coordinates: {}
        markers: {}
        logbook_days: {}
        trip_summary: {}
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    StatusEnum:
      enum:
      - draft
      - completed
      - archived
      type: string
      description: |-
        * `draft` - Draft
        * `completed` - Completed
        * `archived` - Archived
    Trip:
      type: object
      description: Serializer for Trip model with full trip data.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
        current_location:
          type: string
          maxLength: 255
        pickup_location:
          type: string
          maxLength: 255
        dropoff_location:
          type: string
          maxLength: 255
        cycle_hours_used:
          type: number
          format: double
          description: Hours already used in current 70-hour cycle
        trip_date:
          type: string
          format: date
          nullable: true
        tractor_number:
          type: string
          maxLength: 50
        trailer_number:
          type: string
          maxLength: 50
        shipper_name:
          type: string
          maxLength: 255
        route_coordinates: {}
        markers: {}
        logbook_days: {}
        trip_summary: {}
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - current_location
      - dropoff_location
      - id
      - pickup_location
      - updated_at
      - user
    TripCreate:
      type: object
      description: Serializer for creating a new trip from form input.
      properties:
        current_location:
          type: string
          maxLength: 500
          minLength: 2
        pickup_location:
          type: string
          maxLength: 500
          minLength: 2
        dropoff_location:
          type: string
          maxLength: 500
          minLength: 2
        cycle_hours_used:
          type: number
          format: double
          maximum: 70
          minimum: 0
        trip_date:
          type: string
          format: date
          nullable: true
        tractor_number:
          type: string
          default: ''
          maxLength: 50
        trailer_number:
          type: string
          default: ''
          maxLength: 50
        shipper_name:
          type: string
          default: ''
          maxLength: 255
      required:
      - current_location
      - cycle_hours_used
      - dropoff_location
      - pickup_location
    TripInput:
      type: object
      properties:
        current_location:
          type: string
          maxLength: 500
          minLength: 2
        pickup_location:
          type: string
          maxLength: 500
          minLength: 2
        dropoff_location:
          type: string
          maxLength: 500
          minLength: 2
        cycle_hours_used:
          type: number
          format: double
          maximum: 70
          minimum: 0
        trip_date:
          type: string
          format: date
          nullable: true
        tractor_number:
          type: string
          default: ''
          maxLength: 50
        trailer_number:
          type: string
          default: ''
          maxLength: 50
        shipper_name:
          type: string
          default: ''
          maxLength: 255
      required:
      - current_location
      - cycle_hours_used
      - dropoff_location
      - pickup_location
    TripList:
      type: object
      description: Lightweight serializer for trip list endpoints.
      properties:
        id:
          type: integer
          readOnly: true
        current_location:
          type: string
          maxLength: 255
        pickup_location:
          type: string
          maxLength: 255
        dropoff_location:
          type: string
          maxLength: 255
        cycle_hours_used:
          type: number
          format: double
          description: Hours already used in current 70-hour cycle
        trip_date:
          type: string
          format: date
          nullable: true
        tractor_number:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/StatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - current_location
      - dropoff_location
      - id
      - pickup_location
    TripOutput:
      type: object
      properties:
        route_coordinates:
          type: array
          items:
            type: array
            items:
              type: number
              format: double
        markers:
          type: array
          items:
            $ref: '#/components/schemas/Marker'
        logbook_days:
          type: array
          items:
            $ref: '#/components/schemas/LogbookDay'
        trip_summary:
          $ref: '#/components/schemas/TripSummary'
      required:
      - logbook_days
      - markers
      - route_coordinates
      - trip_summary
    TripSummary:
      type: object
      properties:
        total_distance_miles:
          type: number
          format: double
        total_trip_hours:
          type: number
          format: double
        total_drive_hours:
          type: number
          format: double
        legs:
          type: integer
        rest_stops:
          type: integer
        fuel_stops:
          type: integer
      required:
      - fuel_stops
      - legs
      - rest_stops
      - total_distance_miles
      - total_drive_hours
      - total_trip_hours
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
