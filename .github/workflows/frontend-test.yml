name: Frontend Tests & Build

on:
  push:
    branches: [main, develop, chore/frontend-modernization]
    paths: ['frontend/**', '.github/workflows/frontend-*.yml', 'DEVOPS_STRATEGY.md']
  pull_request:
    branches: [main, develop]
    paths: ['frontend/**']

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build project
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.spotter-eld.app

      - name: Check bundle size
        working-directory: frontend
        run: |
          DIST_SIZE=$(du -sh dist | awk '{print $1}')
          echo "✓ Bundle size: $DIST_SIZE"

      - name: Comment PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Frontend build successful!\n\n- TypeScript strict mode: ✓\n- Bundle optimized: ✓\n- Ready for deployment'
            })

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel Preview
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
