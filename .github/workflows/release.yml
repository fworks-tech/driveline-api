name: Release & Deployment

on:
  push:
    tags:
      - 'v*.*.*'          # v1.0.0 (coordinated release)
      - 'v*.*.*-web'      # v1.0.0-web (frontend only)
      - 'v*.*.*-api'      # v1.0.0-api (backend only)

jobs:
  detect-release-type:
    runs-on: ubuntu-latest
    outputs:
      type: ${{ steps.detect.outputs.type }}
      version: ${{ steps.detect.outputs.version }}

    steps:
      - name: Detect release type
        id: detect
        run: |
          TAG="${{ github.ref_name }}"

          if [[ $TAG == *"-web" ]]; then
            echo "type=frontend" >> $GITHUB_OUTPUT
            echo "version=${TAG%-web}" >> $GITHUB_OUTPUT
          elif [[ $TAG == *"-api" ]]; then
            echo "type=backend" >> $GITHUB_OUTPUT
            echo "version=${TAG%-api}" >> $GITHUB_OUTPUT
          else
            echo "type=coordinated" >> $GITHUB_OUTPUT
            echo "version=$TAG" >> $GITHUB_OUTPUT
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: detect-release-type

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Release ${{ needs.detect-release-type.outputs.version }}"
          body: |
            ## Release ${{ needs.detect-release-type.outputs.version }}

            Type: ${{ needs.detect-release-type.outputs.type }}

            ### What's New
            - See commit messages for details

            ### Deployment Status
            - Frontend: [Vercel Dashboard](https://vercel.com)
            - Backend: [Railway Dashboard](https://railway.app)

            Generated by GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-frontend:
    if: contains(fromJSON('["frontend", "coordinated"]'), needs.detect-release-type.outputs.type)
    runs-on: ubuntu-latest
    needs: [detect-release-type, create-release]

    steps:
      - name: Trigger Vercel deployment
        run: |
          echo "✓ Vercel deployment triggered"
          echo "  Version: ${{ needs.detect-release-type.outputs.version }}"
          echo "  URL: https://spotter-eld.app"
          echo ""
          echo "ℹ️  Vercel auto-deploys on tag push"
          echo "ℹ️  Check Vercel dashboard for deployment status"

  deploy-backend:
    if: contains(fromJSON('["backend", "coordinated"]'), needs.detect-release-type.outputs.type)
    runs-on: ubuntu-latest
    needs: [detect-release-type, create-release]

    steps:
      - name: Trigger Railway deployment
        run: |
          echo "✓ Railway deployment triggered"
          echo "  Version: ${{ needs.detect-release-type.outputs.version }}"
          echo "  URL: https://api.spotter-eld.app"
          echo ""
          echo "ℹ️  Railway auto-deploys on tag push"
          echo "ℹ️  Check Railway dashboard for deployment status"

  notify-team:
    if: always()
    runs-on: ubuntu-latest
    needs: [detect-release-type, create-release]

    steps:
      - name: Deployment summary
        run: |
          echo "🚀 Release Summary"
          echo "================="
          echo "Version: ${{ needs.detect-release-type.outputs.version }}"
          echo "Type: ${{ needs.detect-release-type.outputs.type }}"
          echo ""
          echo "✓ GitHub Release created"
          echo "✓ Deployments triggered"
          echo ""
          echo "Check GitHub Release & deployment dashboards for status"
