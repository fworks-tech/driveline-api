name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., latest, v1.0.0)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  test-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: |
          pip install -r requirements.txt
          pytest trips/tests/ -v --cov=trips --cov-report=term-only --cov-fail-under=70

      - name: Check code quality
        run: |
          pip install black isort flake8
          black --check .
          isort --check-only .
          flake8 . --exclude migrations/ --max-line-length=120

  create-release:
    needs: test-image
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Docker Image

            The production Docker image has been built and pushed to the container registry.

            ### Pull Image
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Run Image
            ```bash
            docker run -it \
              -e DEBUG=False \
              -e DJANGO_SECRET_KEY=<your-secret-key> \
              -e DATABASE_URL=<database-url> \
              -e REDIS_URL=<redis-url> \
              -e ALLOWED_HOSTS=<domain> \
              -e CORS_ALLOWED_ORIGINS=<frontend-url> \
              -p 8000:8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ### Railway Deployment
            Connect this image to your Railway project:
            1. Go to Railway dashboard → Variables
            2. Set `RAILWAY_DOCKERFILE_PATH=Dockerfile.prod`
            3. Connect your GitHub repo
            4. Railway will automatically build and deploy

            See [DEPLOYMENT.md](docs/DEPLOYMENT.md) for full deployment instructions.
          draft: false
          prerelease: false
