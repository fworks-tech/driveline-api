name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: spotter_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: |
          python manage.py check

      - name: Run migrations
        run: |
          python manage.py migrate

      - name: Run unit tests with coverage
        run: |
          pytest trips/tests/ -v --cov=trips --cov-report=xml --cov-report=html


      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Generate coverage badge
        if: always()
        run: |
          pip install coverage-badge
          coverage-badge -o coverage.svg -f

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            htmlcov/
            coverage.svg
            .coverage

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run type checks
        run: |
          python -m mypy spotter trips --ignore-missing-imports || true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Check code formatting with black
        run: black --check spotter trips

      - name: Check import sorting with isort
        run: isort --check-only spotter trips

      - name: Lint with flake8
        run: |
          flake8 spotter trips --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 spotter trips --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  openapi-validation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate OpenAPI schema
        run: |
          python manage.py spectacular --file docs/openapi.yaml

      - name: Validate OpenAPI schema
        run: |
          pip install pyyaml
          python -c "
          import yaml
          with open('docs/openapi.yaml', 'r') as f:
              try:
                  data = yaml.safe_load(f)
                  assert 'openapi' in data
                  assert 'paths' in data
                  assert '/api/plan-route/' in data['paths']
                  print('✓ OpenAPI schema is valid')
              except Exception as e:
                  print(f'✗ OpenAPI schema validation failed: {e}')
                  exit(1)
          "
