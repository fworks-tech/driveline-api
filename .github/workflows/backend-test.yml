name: Backend Tests & Validation

on:
  push:
    branches: [main, develop, feat/backend-*]
    paths: ['backend/**', '.github/workflows/backend-*.yml', 'DEVOPS_STRATEGY.md']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: driveline_test
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run migrations
        working-directory: backend
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://postgres:testpass123@localhost:5432/driveline_test
          DJANGO_SECRET_KEY: test-secret-key-do-not-use-in-production
        run: |
          python manage.py migrate --noinput

      - name: Run tests with coverage
        working-directory: backend
        env:
          DEBUG: 'False'
          DATABASE_URL: postgresql://postgres:testpass123@localhost:5432/driveline_test
          DJANGO_SECRET_KEY: test-secret-key-do-not-use-in-production
        run: |
          coverage run --source='.' manage.py test --no-input --verbosity=2 trips
          coverage report --fail-under=70
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Code quality check
        working-directory: backend
        run: |
          echo "✓ Migrations: OK"
          echo "✓ Tests: PASSED"
          echo "✓ Coverage: 70%+"
          echo "✓ Ready for deployment"

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Backend tests passed!\n\n- Django migrations: ✓\n- Unit tests: ✓\n- Coverage: 70%+\n- Ready for review'
            })

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Check code formatting with black
        working-directory: backend
        run: black --check . --exclude migrations/
        continue-on-error: true

      - name: Check imports with isort
        working-directory: backend
        run: isort --check-only . --skip migrations/
        continue-on-error: true

      - name: Lint with flake8
        working-directory: backend
        run: |
          flake8 . --exclude migrations/,venv/ --max-line-length=100 \
            --extend-ignore=E203,W503
        continue-on-error: true
